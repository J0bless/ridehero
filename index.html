<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Park Route Planner</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100dvh;}
.screen{display:none;}.screen.active{display:block;}
.setup{padding:24px 20px 40px;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.logo-icon{width:44px;height:44px;background:#185FA5;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.logo h1{font-size:22px;font-weight:700;color:#1c1c1e;}
.logo p{font-size:13px;color:#8e8e93;margin-top:1px;}
.section-label{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.06em;margin:20px 0 8px;}
.inset-group{background:#fff;border-radius:12px;overflow:hidden;}
.inset-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:0.5px solid #e5e5ea;}
.inset-row:last-child{border-bottom:none;}
.inset-row label{font-size:15px;color:#1c1c1e;flex-shrink:0;}
.inset-row input[type=number]{width:60px;border:none;outline:none;font-size:15px;color:#185FA5;background:transparent;text-align:right;font-weight:600;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mode-card{background:#fff;border-radius:14px;padding:18px 14px;border:2px solid transparent;cursor:pointer;transition:border-color 0.15s,background 0.15s;text-align:left;-webkit-tap-highlight-color:transparent;}
.mode-card.active{border-color:#185FA5;background:#f0f6ff;}
.mode-card .mode-icon{font-size:26px;display:block;margin-bottom:10px;}
.mode-card .mode-name{font-size:14px;font-weight:700;color:#1c1c1e;}
.mode-card .mode-sub{font-size:11px;color:#8e8e93;margin-top:4px;line-height:1.4;}
.mode-card.active .mode-name{color:#185FA5;}
.park-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.park-card{background:#fff;border-radius:14px;padding:16px 14px;border:2px solid transparent;cursor:pointer;transition:border-color 0.15s,background 0.15s;text-align:left;-webkit-tap-highlight-color:transparent;}
.park-card.active{border-color:#185FA5;background:#f0f6ff;}
.park-card .park-emoji{font-size:28px;display:block;margin-bottom:8px;}
.park-card .park-name{font-size:14px;font-weight:600;color:#1c1c1e;line-height:1.3;}
.park-card .park-sub{font-size:12px;color:#8e8e93;margin-top:2px;}
.cta{margin-top:28px;}
.big-btn{width:100%;padding:16px;background:#185FA5;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;}
.big-btn:active{opacity:0.85;}
.big-btn.secondary{background:#e5e5ea;color:#1c1c1e;}
.rides-screen{padding-bottom:100px;}
.top-bar{background:#fff;border-bottom:0.5px solid #e5e5ea;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.back-btn{background:none;border:none;color:#185FA5;font-size:15px;font-weight:500;cursor:pointer;padding:4px 0;}
.top-bar-title{font-size:17px;font-weight:600;flex:1;}
.refresh-btn{background:none;border:none;color:#185FA5;font-size:22px;cursor:pointer;padding:4px;line-height:1;}
.source-chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;}
.sc-tp{background:#dcfce7;color:#166534;}
.sc-qt{background:#fef9c3;color:#854d0e;}
.rides-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.ride-card{background:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;border:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ride-card.on{border-color:#185FA5;background:#f0f6ff;}
.ride-check{width:24px;height:24px;border-radius:50%;border:2px solid #c7c7cc;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ride-card.on .ride-check{background:#185FA5;border-color:#185FA5;}
.ride-check-mark{display:none;color:#fff;font-size:13px;font-weight:700;line-height:1;}
.ride-card.on .ride-check-mark{display:block;}
.ride-info{flex:1;min-width:0;}
.ride-name{font-size:15px;font-weight:500;color:#1c1c1e;line-height:1.3;}
.ride-area{font-size:12px;color:#8e8e93;margin-top:2px;}
.wait-badge{flex-shrink:0;padding:5px 11px;border-radius:99px;font-size:13px;font-weight:700;}
.wl{background:#dcfce7;color:#166534;}
.wm{background:#fef9c3;color:#854d0e;}
.wh{background:#fee2e2;color:#991b1b;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:#f2f2f7;border-top:0.5px solid #e5e5ea;}
.sel-info{font-size:13px;color:#8e8e93;text-align:center;margin-bottom:8px;}
.bottom-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sm-btn{padding:13px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sm-btn.outline{background:#fff;color:#185FA5;border:1.5px solid #185FA5;}
.sm-btn.filled{background:#185FA5;color:#fff;}
.priority-screen{padding-bottom:110px;}
.priority-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.priority-card{background:#fff;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;border:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color 0.12s,background 0.12s;}
.priority-card.must{border-color:#ff9500;background:#fff8f0;}
.priority-card.want{border-color:#185FA5;background:#f0f6ff;}
.priority-dot{width:24px;height:24px;border-radius:50%;border:2px solid #c7c7cc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.priority-card.must .priority-dot{background:#ff9500;border-color:#ff9500;color:#fff;}
.priority-card.want .priority-dot{background:#185FA5;border-color:#185FA5;color:#fff;}
.priority-name{font-size:15px;font-weight:500;color:#1c1c1e;}
.priority-area{font-size:12px;color:#8e8e93;margin-top:2px;}
.legend-row{display:flex;gap:14px;padding:10px 16px 4px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b6b72;}
.legend-dot{width:12px;height:12px;border-radius:50%;}
.route-screen{padding-bottom:40px;}
.route-hero{color:#fff;padding:24px 20px 20px;}
.route-hero h2{font-size:20px;font-weight:700;margin-bottom:4px;}
.route-hero p{font-size:14px;opacity:0.85;line-height:1.5;}
.route-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e5e5ea;border-radius:14px;overflow:hidden;margin:16px 20px;}
.route-stat{background:#fff;padding:14px 10px;text-align:center;}
.route-stat-v{font-size:22px;font-weight:700;color:#1c1c1e;}
.route-stat-l{font-size:11px;color:#8e8e93;margin-top:3px;}
.map-section{margin:0 16px 16px;}
.map-section h3{font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.map-wrap{background:#fff;border-radius:14px;overflow:hidden;}
.map-wrap svg{display:block;width:100%;height:auto;}
.steps-section{padding:0 16px;}
.steps-section h3{font-size:13px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.step-card{background:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.step-num{width:32px;height:32px;border-radius:50%;background:#185FA5;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-name{font-size:15px;font-weight:500;color:#1c1c1e;}
.step-wait{font-size:13px;color:#8e8e93;margin-top:2px;}
.walk-note{text-align:center;font-size:12px;color:#8e8e93;padding:4px 0 2px;}
.day-segment{margin:0 16px 12px;}
.seg-label{font-size:11px;font-weight:700;color:#8e8e93;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;padding-left:4px;}
.seg-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:6px;}
.seg-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid #f3f4f6;}
.seg-row:last-child{border-bottom:none;}
.seg-time{font-size:12px;font-weight:600;color:#8e8e93;width:44px;flex-shrink:0;}
.seg-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
.seg-detail{flex:1;min-width:0;}
.seg-name{font-size:14px;font-weight:500;color:#1c1c1e;}
.seg-sub{font-size:12px;color:#8e8e93;margin-top:1px;}
.must-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;background:#fff3e0;color:#e65100;}
.loading{text-align:center;padding:60px 20px;}
.loading-spinner{width:36px;height:36px;border:3px solid #e5e5ea;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:15px;color:#8e8e93;}
.error-box{margin:16px;background:#fff;border-radius:12px;padding:20px;text-align:center;}
.error-box p{font-size:14px;color:#ff3b30;line-height:1.5;}
.error-box button{margin-top:14px;padding:10px 24px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<!-- SCREEN 1: Setup -->
<div class="screen active" id="screen-setup">
  <div class="setup">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div>
        <h1>Park Planner</h1>
        <p>Disney World · Live wait times</p>
      </div>
    </div>

    <div class="section-label">Planning mode</div>
    <div class="mode-grid">
      <button class="mode-card active" data-mode="quick" onclick="selectMode(this)">
        <span class="mode-icon">⚡</span>
        <div class="mode-name">Quick picks</div>
        <div class="mode-sub">Next 3 rides, re-optimize as you go</div>
      </button>
      <button class="mode-card" data-mode="fullday" onclick="selectMode(this)">
        <span class="mode-icon">📅</span>
        <div class="mode-name">Full day plan</div>
        <div class="mode-sub">Complete schedule for your whole visit</div>
      </button>
    </div>

    <div id="hours-section" style="display:none">
      <div class="section-label">Park hours</div>
      <div class="inset-group">
        <div class="inset-row">
          <label>Opens at</label>
          <input type="number" id="open-hour" value="9" min="7" max="12"/>
          <span style="font-size:15px;color:#8e8e93;margin-left:4px;">am</span>
        </div>
        <div class="inset-row">
          <label>Closes at</label>
          <input type="number" id="close-hour" value="10" min="6" max="12"/>
          <span style="font-size:15px;color:#8e8e93;margin-left:4px;">pm</span>
        </div>
      </div>
    </div>

    <div class="section-label">Choose a park</div>
    <div class="park-grid">
      <button class="park-card active" data-park="mk" onclick="selectPark(this)">
        <span class="park-emoji">🏰</span>
        <div class="park-name">Magic Kingdom</div>
        <div class="park-sub">Classic Disney</div>
      </button>
      <button class="park-card" data-park="ep" onclick="selectPark(this)">
        <span class="park-emoji">🌍</span>
        <div class="park-name">EPCOT</div>
        <div class="park-sub">World & tech</div>
      </button>
      <button class="park-card" data-park="hs" onclick="selectPark(this)">
        <span class="park-emoji">🎬</span>
        <div class="park-name">Hollywood Studios</div>
        <div class="park-sub">Star Wars & more</div>
      </button>
      <button class="park-card" data-park="ak" onclick="selectPark(this)">
        <span class="park-emoji">🦁</span>
        <div class="park-name">Animal Kingdom</div>
        <div class="park-sub">Nature & Pandora</div>
      </button>
    </div>

    <div class="cta">
      <button class="big-btn" onclick="goToRides()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        See wait times
      </button>
    </div>
  </div>
</div>

<!-- SCREEN 1b: Priority picker -->
<div class="screen" id="screen-priority">
  <div class="priority-screen">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('rides')">‹ Back</button>
      <div class="top-bar-title">Pick your must-dos</div>
    </div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#ff9500"></div>Tap once = Must ride</div>
      <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Twice = Want to</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e5e5ea"></div>Three times = Skip</div>
    </div>
    <div class="priority-list" id="priority-list"></div>
    <div class="bottom-bar" id="priority-footer" style="display:none">
      <div class="sel-info" id="priority-info"></div>
      <button class="big-btn" onclick="buildFullDayRoute()">Build my day plan →</button>
    </div>
  </div>
</div>

<!-- SCREEN 2: Rides -->
<div class="screen" id="screen-rides">
  <div class="rides-screen">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('setup')">‹ Back</button>
      <div class="top-bar-title" id="rides-title">Magic Kingdom</div>
      <button class="refresh-btn" onclick="reloadRides()" aria-label="Refresh">↻</button>
    </div>
    <div id="rides-body">
      <div class="loading"><div class="loading-spinner"></div><p>Loading wait times...</p></div>
    </div>
    <div class="bottom-bar" id="rides-footer" style="display:none">
      <div class="sel-info" id="sel-info"></div>
      <div class="bottom-actions">
        <button class="sm-btn outline" onclick="toggleAll()">Select all</button>
        <button class="sm-btn filled" id="rides-cta-btn" onclick="handleRidesCTA()">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN 3: Route -->
<div class="screen" id="screen-route">
  <div class="route-screen">
    <div class="top-bar">
      <button class="back-btn" id="route-back-btn" onclick="showScreen('rides')">‹ Rides</button>
      <div class="top-bar-title">Your route</div>
    </div>
    <div id="route-body"></div>
  </div>
</div>

  'seven dwarfs':{lat:28.4204,lng:-81.5793},'big thunder':{lat:28.4195,lng:-81.5835},

  'space mountain':{lat:28.4198,lng:-81.5757},'tron':{lat:28.4207,lng:-81.5752},
  'buzz lightyear':{lat:28.4196,lng:-81.5762},'people mover':{lat:28.4201,lng:-81.5758},

  'barnstormer':{lat:28.4215,lng:-81.5800},'dumbo':{lat:28.4214,lng:-81.5793},
  'under the sea':{lat:28.4213,lng:-81.5808},'mad tea':{lat:28.4210,lng:-81.5796},
  'winnie the pooh':{lat:28.4209,lng:-81.5805},'monsters':{lat:28.4200,lng:-81.5763},

};

// ThemeParks.wiki direct API (supports CORS from browsers - no proxy needed)
const TP_BASE = 'https://api.themeparks.wiki/v1/entity/';
const TP_IDS = {
  mk: '75ea578a-adc8-4116-a54d-dccb60765ef9',
  ep: '47f90d2c-e191-4239-a466-5892ef59a88b',
  hs: '288747d1-8b4f-4a64-867e-ea7c9b27bad8',
  ak: '1c84a229-8862-4648-9c71-378ddd2c7693'
};
// Proxy fallback for Queue-Times (still needs CORS proxy)
const PROXY_URL = 'https://waittimes.johnson96eric.workers.dev';
const HERO_COLORS = {mk:'#1a2744',ep:'#0F6E56',hs:'#4a1a08',ak:'#1a2e0a'};
const PARK_BOXES = {
  mk:{minLat:28.418,maxLat:28.423,minLng:-81.586,maxLng:-81.574},
  ep:{minLat:28.372,maxLat:28.378,minLng:-81.552,maxLng:-81.546},
  hs:{minLat:28.354,maxLat:28.359,minLng:-81.565,maxLng:-81.558},
  ak:{minLat:28.354,maxLat:28.363,minLng:-81.595,maxLng:-81.587}
};

let currentMode = 'quick';
let currentPark = 'mk';
let rides = [];
let selected = new Set();
let priority = {};
let ridePos = {};
let routeOrder = [];
let hours = 13;

// ── Screen management ────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
  var rf = document.getElementById('rides-footer');
  var pf = document.getElementById('priority-footer');
  if (rf) rf.style.display = (id === 'rides' && rides.length) ? 'block' : 'none';
  if (pf) pf.style.display = (id === 'priority') ? 'block' : 'none';
}

// ── Setup screen ─────────────────────────────────────────────────────────────

function selectMode(btn) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
  document.getElementById('hours-section').style.display = currentMode === 'fullday' ? 'block' : 'none';
}

function selectPark(btn) {

// ── Rides screen ─────────────────────────────────────────────────────────────

async function reloadRides() {
  document.getElementById('rides-body').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Loading wait times...</p></div>';
  document.getElementById('rides-footer').style.display = 'none';

  var tpId = TP_IDS[currentPark];
  var urls = [
    'https://api.themeparks.wiki/v1/entity/' + tpId + '/live',
    'https://corsproxy.io/?' + encodeURIComponent('https://api.themeparks.wiki/v1/entity/' + tpId + '/live'),
    PROXY_URL + '/waittimes?park=' + currentPark + '&source=auto'
  ];

  for (var i = 0; i < urls.length; i++) {
    try {
      var res = await fetch(urls[i]);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();

      // themeparks.wiki direct or corsproxy response
      if (data.liveData) {
        rides = [];
        data.liveData.forEach(function(e) {
          if (e.entityType !== 'ATTRACTION' || e.status !== 'OPERATING') return;
          var wait = 0;
          if (e.queue && e.queue.STANDBY && e.queue.STANDBY.waitTime != null)
            wait = e.queue.STANDBY.waitTime;
          rides.push({ id: e.id, name: e.name, waitTime: wait, area: '' });
        });
      } else if (data.rides) {
        // proxy response
        rides = data.rides;
      } else {
        throw new Error('Unrecognised response format');
      }

      if (!rides.length) throw new Error('No open rides');
      rides.sort(function(a, b) { return a.waitTime - b.waitTime; });
      selected = new Set(rides.map(function(r) { return r.id; }));
      assignPositions();
      renderRides(i === 0 ? 'themeparks.wiki' : i === 1 ? 'themeparks.wiki (proxy)' : 'queue-times.com');
      document.getElementById('rides-footer').style.display = 'block';
      updateSelInfo();
      return;
    } catch(e) {
      console.warn('Source ' + i + ' failed: ' + e.message);
    }
  }

  document.getElementById('rides-body').innerHTML =
    '<div class="error-box"><p>Could not load wait times. Check your connection and try again.</p>' +
    '<button id="retry-btn">Try again</button></div>';
  var btn = document.getElementById('retry-btn');
  if (btn) btn.addEventListener('click', reloadRides);
}

function wc(w) { return w <= 20 ? 'wl' : w <= 45 ? 'wm' : 'wh'; }

function renderRides(source) {
  var html = '';
  if (source) {
    var cls = source.includes('themeparks') ? 'sc-tp' : 'sc-qt';
    var label = source.includes('themeparks') ? 'ThemeParks.wiki' : 'Queue-Times.com';
    html += '<div style="padding:10px 16px 2px;display:flex;align-items:center;gap:8px;"><span class="source-chip ' + cls + '">' + label + '</span><span style="font-size:12px;color:#8e8e93;">' + rides.length + ' open rides</span></div>';
  }
  html += '<div class="rides-list">';
  rides.forEach(function(r) {
    var on = selected.has(r.id);
    html += '<div class="ride-card' + (on ? ' on' : '') + '" data-id="' + r.id + '">' +
      '<div class="ride-check"><span class="ride-check-mark">✓</span></div>' +
      '<div class="ride-info"><div class="ride-name">' + r.name + '</div>' +
      (r.area ? '<div class="ride-area">' + r.area + '</div>' : '') + '</div>' +
      '<span class="wait-badge ' + wc(r.waitTime) + '">' + r.waitTime + 'm</span></div>';
  });
  html += '</div>';
  document.getElementById('rides-body').innerHTML = html;
  document.querySelectorAll('.ride-card[data-id]').forEach(function(card) {
    card.addEventListener('click', function() { toggleRide(card.dataset.id); });
  });
}

function toggleRide(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  var card = document.querySelector('.ride-card[data-id="' + id + '"]');
  if (card) card.classList.toggle('on', selected.has(id));
  updateSelInfo();
}

function toggleAll() {
  var btn = document.querySelector('.sm-btn.outline');
  if (selected.size === rides.length) {
    selected.clear();
    if (btn) btn.textContent = 'Select all';
  } else {
    rides.forEach(function(r) { selected.add(r.id); });
    if (btn) btn.textContent = 'Deselect all';
  }
  document.querySelectorAll('.ride-card[data-id]').forEach(function(card) {
    card.classList.toggle('on', selected.has(card.dataset.id));
  });
  updateSelInfo();
}

function updateSelInfo() {
  var el = document.getElementById('sel-info');
  if (el) el.textContent = selected.size + ' rides selected';
  var btn = document.getElementById('rides-cta-btn');
  if (btn) btn.textContent = currentMode === 'fullday' ? 'Pick must-dos →' : 'Optimize route →';

function handleRidesCTA() {
  if (currentMode === 'fullday') {
    openPriorityPicker();
  } else {
    var sel = rides.filter(function(r) { return selected.has(r.id); });
    if (sel.length < 2) { alert('Select at least 2 rides to plan a route.'); return; }
    optimizeRoute();
  }
}

// ── GPS / distance helpers ────────────────────────────────────────────────────

function getRideCoords(name) {
  var lower = name.toLowerCase();
  var keys = Object.keys(RIDE_COORDS);
  for (var i = 0; i < keys.length; i++) {
    if (lower.includes(keys[i])) return RIDE_COORDS[keys[i]];
  }
  return null;
}

function distMetres(a, b) {
  var R = 6371000;
  var dLat = (b.lat - a.lat) * Math.PI / 180;
  var dLng = (b.lng - a.lng) * Math.PI / 180;
  var s = Math.pow(Math.sin(dLat/2), 2) + Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.pow(Math.sin(dLng/2), 2);
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function walkMins(a, b) {
  var ca = getRideCoords(a.name);
  var cb = getRideCoords(b.name);
  if (!ca || !cb) return 8;
  return Math.round(distMetres(ca, cb) / 80 * 10) / 10;
}

function rideScore(current, candidate, isMust) {
  var walk = walkMins(current, candidate);
  return (isMust ? 0 : 20) + candidate.waitTime + walk * 1.5;
}

// ── Map position helpers ──────────────────────────────────────────────────────

function assignPositions() {
  ridePos = {};
  var zones = PARK_META[currentPark].zones || [];
  var box = PARK_BOXES[currentPark];
  rides.forEach(function(ride, i) {
    var coords = getRideCoords(ride.name);
    if (coords && box) {
      var x = 20 + ((coords.lng - box.minLng) / (box.maxLng - box.minLng)) * 360;
      var y = 20 + ((box.maxLat - coords.lat) / (box.maxLat - box.minLat)) * 270;
      ridePos[ride.id] = {x: Math.max(20, Math.min(380, x)), y: Math.max(20, Math.min(290, y))};
    } else {
      var z = zones[i % zones.length] || {x:200, y:155};
      var angle = (i / Math.max(rides.length, 1)) * Math.PI * 2;
      var radius = 28 + (i % 4) * 14;
      ridePos[ride.id] = {
        x: Math.max(20, Math.min(380, z.x + Math.cos(angle) * radius)),
        y: Math.max(20, Math.min(290, z.y + Math.sin(angle) * radius))
      };
    }
  });
}

    el('ellipse', { cx: 340, cy: 328, rx: 10, ry: 6, fill: '#2040c0', opacity: 0.4 });
    txt('Flight of Passage', 320, 360, { fill: '#8090ff', size: 6.5, w: 700 });

    // ── NAVI RIVER ────────────────────────────────────────
    path('M278,296 C286,283 302,280 318,284 C334,288 344,300 342,314', { stroke: '#2848a8', 'stroke-width': 6, 'stroke-linecap': 'round', opacity: 0.8 });
    path('M278,296 C286,283 302,280 318,284 C334,288 344,300 342,314', { stroke: '#5078d8', 'stroke-width': 3, 'stroke-linecap': 'round', 'stroke-dasharray': '4,4', opacity: 0.6 });
    txt("Na'vi River", 308, 296, { fill: '#9090ff', size: 6, w: 600 });

    // ── KALI RIVER RAPIDS ─────────────────────────────────
    el('circle', { cx: 328, cy: 178, rx: 18, r: 18, fill: '#2878a8', stroke: '#1858a8', 'stroke-width': 2 });
    el('circle', { cx: 328, cy: 178, r: 11, fill: '#1858a0' });
    path('M310,178 A18,18 0 0,1 346,178', { stroke: '#60c0e8', 'stroke-width': 2.5, fill: 'none' });
    txt('Kali River', 328, 200, { fill: '#a0e8ff', size: 6, w: 600 });

    // ── DINOSAUR ──────────────────────────────────────────
    // Dino body
    path('M128,330 C120,318 122,305 132,300 C140,296 152,298 158,306 C165,298 178,296 182,306 C188,300 196,300 194,312 C192,322 180,332 165,335 Z', { fill: '#4a3008', stroke: '#2a1804', 'stroke-width': 1 });
    // Head
    path('M182,306 C190,298 200,296 202,304 C204,312 198,318 190,316 Z', { fill: '#603818' });
    el('circle', { cx: 196, cy: 302, r: 2.5, fill: '#e0c060' });
    // Spikes
    path('M148,300 L145,290 L151,292 Z', { fill: '#6a3810' });
    path('M158,298 L156,287 L163,290 Z', { fill: '#6a3810' });
    path('M168,298 L167,287 L173,291 Z', { fill: '#6a3810' });
    // Legs
    el('rect', { x: 133, y: 330, width: 8, height: 14, fill: '#3a2008', rx: 2 });
    el('rect', { x: 155, y: 332, width: 8, height: 14, fill: '#3a2008', rx: 2 });
    txt('DINOSAUR', 158, 352, { fill: '#f8d878', size: 7, w: 700 });

    // Land labels
    txt('Pandora', 318, 322, { fill: '#8888ff', size: 8, w: 700 });
    txt('Africa', 100, 152, { fill: '#f8e838', size: 8, w: 700 });
    txt('Asia', 314, 148, { fill: '#a8f868', size: 8, w: 700 });
    txt('DinoLand', 148, 332, { fill: '#f8c858', size: 7.5, w: 700 });
    txt('Discovery Island', 210, 212, { fill: '#d0ff90', size: 6.5, w: 700 });
  }

  // Non-route ride dots
  var selRides = rides.filter(function(r) { return selected.has(r.id); });
  selRides.forEach(function(r) {
    var pos = ridePos[r.id];
    if (!pos || route.indexOf(r.id) >= 0) return;
    el('circle', { cx: pos.x, cy: pos.y, r: 8, fill: 'rgba(255,255,255,0.3)', stroke: 'rgba(255,255,255,0.6)', 'stroke-width': 1 });
    el('circle', { cx: pos.x, cy: pos.y, r: 5, fill: 'rgba(255,255,255,0.75)', stroke: 'rgba(0,0,0,0.15)', 'stroke-width': 0.8 });
  });

  // Route path
  if (route.length > 1) {
    var pts = route.map(function(id) { return ridePos[id]; }).filter(Boolean);
    if (pts.length > 1) {
      var d = 'M' + pts[0].x + ' ' + pts[0].y;
      for (var i = 1; i < pts.length; i++) d += ' L' + pts[i].x + ' ' + pts[i].y;
      path(d, { stroke: 'rgba(0,0,0,0.3)', 'stroke-width': 6, 'stroke-linecap': 'round' });
      path(d, { stroke: '#ffffff', 'stroke-width': 3.5, 'stroke-dasharray': '8,5', 'stroke-linecap': 'round' });
    }
  }

  // Numbered stops
  var meta = PARK_META[currentPark];
  route.forEach(function(id, idx) {
    var pos = ridePos[id];
    if (!pos) return;
    el('circle', { cx: pos.x, cy: pos.y, r: 18, fill: 'rgba(0,0,0,0.3)' });
    el('circle', { cx: pos.x, cy: pos.y, r: 16, fill: meta.color, stroke: '#ffffff', 'stroke-width': 2.5 });
    var n = el('text', { x: pos.x, y: pos.y + 5, 'text-anchor': 'middle', 'font-size': 13, 'font-weight': 700, fill: '#fff', 'font-family': 'system-ui' });
    n.textContent = idx + 1;
  });

  return svg;
}


// ── Quick route (3 rides) ─────────────────────────────────────────────────────

function computeLocalRoute(sel) {
  if (!sel.length) return [];
  var remaining = sel.slice();
  var route = [];
  var current = {name:'entrance', waitTime:0};
  while (remaining.length && route.length < 3) {
    var best = null, bestScore = Infinity;
    remaining.forEach(function(r) {
      var s = r.waitTime + walkMins(current, r) * 1.5;
      if (s < bestScore) { bestScore = s; best = r; }
    });
    route.push(best);
    remaining.splice(remaining.indexOf(best), 1);
    current = best;
  }
  return route;
}

async function optimizeRoute() {
  var sel = rides.filter(function(r) { return selected.has(r.id); });
  if (sel.length < 2) { alert('Select at least 2 rides.'); return; }
  showScreen('route');
  document.getElementById('route-back-btn').onclick = function() { showScreen('rides'); };
  document.getElementById('route-body').innerHTML = '<div class="loading" style="padding-top:80px"><div class="loading-spinner"></div><p>Building your route...</p></div>';

  var meta = PARK_META[currentPark];
  var top3 = computeLocalRoute(sel);
  routeOrder = top3.map(function(r) { return r.id; });

  var walkLabels = [];
  for (var i = 0; i < top3.length - 1; i++) {
    var w = walkMins(top3[i], top3[i+1]);
    walkLabels.push(w < 1 ? '<1 min walk' : Math.round(w) + ' min walk');
  }

  var tip = 'Start with the closest high-demand ride, then work through the area.';
  try {
    var lines = top3.map(function(r) { return r.name + ': ' + r.waitTime + ' min wait'; }).join(', ');
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:120, messages:[{role:'user',
        content:'Disney World ' + meta.name + '. These 3 rides are in optimal order: ' + lines + '. Give one short practical tip (under 20 words). Plain text only.'}]})
    });
    var d = await res.json();
    tip = d.content.map(function(b) { return b.text || ''; }).join('').trim();
  } catch(e) {}

  var totalWait = top3.reduce(function(s,r) { return s + r.waitTime; }, 0);
  var totalWalk = top3.reduce(function(s,r,i) { return i === 0 ? s : s + walkMins(top3[i-1], r); }, 0);
  var totalTime = totalWait + Math.round(totalWalk) + top3.length * 5;
  var heroBg = HERO_COLORS[currentPark] || '#185FA5';

  var mapSvg = buildMap(routeOrder);
  var html = '<div class="route-hero" style="background:' + heroBg + '"><h2>' + meta.emoji + ' Next 3 rides</h2><p>' + tip + '</p></div>' +
    '<div class="route-stats"><div class="route-stat"><div class="route-stat-v">' + top3.length + '</div><div class="route-stat-l">rides</div></div>' +
    '<div class="route-stat"><div class="route-stat-v">' + Math.round(totalWait) + 'm</div><div class="route-stat-l">wait time</div></div>' +
    '<div class="route-stat"><div class="route-stat-v">' + Math.round(totalTime) + 'm</div><div class="route-stat-l">total time</div></div></div>' +
    '<div class="map-section"><h3>Route map</h3><div class="map-wrap" id="map-container"></div></div>' +
    '<div class="steps-section"><h3>Your next stops</h3>';

  top3.forEach(function(ride, i) {
    var walkNote = i < walkLabels.length ? '<div class="walk-note">↓ ' + walkLabels[i] + '</div>' : '';
    html += '<div class="step-card"><div class="step-num">' + (i+1) + '</div>' +
      '<div style="flex:1"><div class="step-name">' + ride.name + '</div>' +
      '<div class="step-wait">' + ride.waitTime + ' min wait' + (ride.area ? ' · ' + ride.area : '') + '</div></div>' +
      '<span class="wait-badge ' + wc(ride.waitTime) + '">' + ride.waitTime + 'm</span></div>' + walkNote;
  });

  var remaining = sel.filter(function(r) { return routeOrder.indexOf(r.id) < 0; });
  if (remaining.length) {
    html += '<div style="margin-top:16px;padding:14px 16px;background:#fff;border-radius:12px;">' +
      '<div style="font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">After these 3</div>';
    remaining.forEach(function(r) {
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f3f4f6;">' +
        '<span style="font-size:14px;color:#6b7280;">' + r.name + '</span>' +
        '<span class="wait-badge ' + wc(r.waitTime) + '">' + r.waitTime + 'm</span></div>';
    });
    html += '</div>';
  }

  html += '</div><div style="margin:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
    '<button class="sm-btn outline" id="back-rides-btn">‹ Back</button>' +
    '<button class="sm-btn filled" id="reopt-btn">Re-optimize</button></div>';

  document.getElementById('route-body').innerHTML = html;
  document.getElementById('map-container').appendChild(mapSvg);
  document.getElementById('back-rides-btn').onclick = function() { showScreen('rides'); };
  document.getElementById('reopt-btn').onclick = reoptimize;
}

function reoptimize() {
  if (routeOrder.length > 0) selected.delete(routeOrder[0]);
  optimizeRoute();
}

// ── Priority picker ───────────────────────────────────────────────────────────

function openPriorityPicker() {
  priority = {};
  rides.forEach(function(r) { priority[r.id] = 'skip'; });
  renderPriorityList();
  showScreen('priority');
  var pf = document.getElementById('priority-footer');
  if (pf) pf.style.display = 'block';
}

function renderPriorityList() {
  var mustCount = Object.values(priority).filter(function(v) { return v === 'must'; }).length;
  var wantCount = Object.values(priority).filter(function(v) { return v === 'want'; }).length;
  var info = document.getElementById('priority-info');
  if (info) info.textContent = mustCount + ' must-dos · ' + wantCount + ' want-to-dos';
  var list = document.getElementById('priority-list');
  list.innerHTML = '';
  rides.forEach(function(r) {
    var p = priority[r.id] || 'skip';
    var icons = {must:'★', want:'✓', skip:''};
    var div = document.createElement('div');
    div.className = 'priority-card' + (p === 'must' ? ' must' : p === 'want' ? ' want' : '');
    div.innerHTML = '<div class="priority-dot">' + (icons[p] || '') + '</div>' +
      '<div style="flex:1"><div class="priority-name">' + r.name + '</div>' +
      (r.area ? '<div class="priority-area">' + r.area + ' · ' + r.waitTime + ' min wait</div>' : '') + '</div>' +
      '<span class="wait-badge ' + wc(r.waitTime) + '">' + r.waitTime + 'm</span>';
    div.addEventListener('click', function() {
      var cur = priority[r.id] || 'skip';
      priority[r.id] = cur === 'skip' ? 'must' : cur === 'must' ? 'want' : 'skip';
      renderPriorityList();
    });
    list.appendChild(div);
  });
}

// ── Full day route ────────────────────────────────────────────────────────────

async function buildFullDayRoute() {
  showScreen('route');
  document.getElementById('route-back-btn').onclick = function() { showScreen('priority'); };
  document.getElementById('route-body').innerHTML = '<div class="loading" style="padding-top:80px"><div class="loading-spinner"></div><p>Building your full day...</p></div>';

  var meta = PARK_META[currentPark];
  var mustRides = rides.filter(function(r) { return priority[r.id] === 'must'; });
  var wantRides = rides.filter(function(r) { return priority[r.id] === 'want'; });
  var allRides = mustRides.concat(wantRides);

  if (!allRides.length) {
    document.getElementById('route-body').innerHTML = '<div class="error-box"><p>Pick at least one must-do or want-to ride first.</p><button id="err-back-btn">‹ Go back</button></div>';
    var eb = document.getElementById('err-back-btn');
    if (eb) eb.onclick = function() { showScreen('priority'); };
    return;
  }

  var budgetMins = hours * 60;
  var remaining = allRides.slice();
  var fullRoute = [];
  var elapsed = 0;
  var current = {name:'entrance', waitTime:0};

  while (remaining.length && elapsed < budgetMins - 20) {
    var musts = remaining.filter(function(r) { return priority[r.id] === 'must'; });
    var pool = musts.length ? musts : remaining;
    var best = null, bestScore = Infinity;
    pool.forEach(function(r) {
      var walk = walkMins(current, r);
      var s = (priority[r.id] === 'must' ? 0 : 20) + r.waitTime + walk * 1.5;
      if (s < bestScore) { bestScore = s; best = r; }
    });
    var walk = current.name === 'entrance' ? 5 : walkMins(current, best);
    var rideCost = best.waitTime + walk + 5;
    if (elapsed + rideCost > budgetMins) break;
    fullRoute.push({ride:best, walkFromPrev:Math.round(walk), startMin:Math.round(elapsed + walk)});
    elapsed += rideCost;
    remaining.splice(remaining.indexOf(best), 1);
    current = best;
  }

  routeOrder = fullRoute.map(function(s) { return s.ride.id; });

  var tip = 'Must-dos are prioritized early, then grouped by area to minimize walking.';
  try {
    var lines = fullRoute.map(function(s, i) {
      return (i+1) + '. ' + s.ride.name + ' (' + (priority[s.ride.id] === 'must' ? 'MUST' : 'want') + ', ' + s.ride.waitTime + 'min)';
    }).join(', ');
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-6', max_tokens:100, messages:[{role:'user',
        content:'Disney World ' + meta.name + ', ' + hours + 'hr visit. Order: ' + lines + '. One practical tip (under 20 words). Plain text only.'}]})
    });
    var d = await res.json();
    tip = d.content.map(function(b) { return b.text || ''; }).join('').trim();
  } catch(e) {}

  var mapSvg = buildMap(routeOrder);
  var heroBg = HERO_COLORS[currentPark] || '#185FA5';
  var openHour = currentMode === 'fullday' ? (parseInt(document.getElementById('open-hour').value) || 9) : 9;

  function minToTime(min) {
    var total = openHour * 60 + min;
    var h = Math.floor(total / 60);
    var m = total % 60;
    var ampm = h >= 12 ? 'pm' : 'am';
    var disp = h > 12 ? h - 12 : h === 0 ? 12 : h;
    return disp + ':' + (m < 10 ? '0' : '') + m + ampm;
  }

  var totalWait = fullRoute.reduce(function(s,r) { return s + r.ride.waitTime; }, 0);
  var mustDone = mustRides.filter(function(r) { return fullRoute.find(function(s) { return s.ride.id === r.id; }); }).length;
  var heroBg2 = HERO_COLORS[currentPark] || '#185FA5';

  var html = '<div class="route-hero" style="background:' + heroBg2 + '"><h2>' + meta.emoji + ' Your full day</h2><p>' + tip + '</p></div>' +
    '<div class="route-stats">' +
    '<div class="route-stat"><div class="route-stat-v">' + fullRoute.length + '</div><div class="route-stat-l">rides</div></div>' +
    '<div class="route-stat"><div class="route-stat-v">' + mustDone + '</div><div class="route-stat-l">must-dos</div></div>' +
    '<div class="route-stat"><div class="route-stat-v">' + Math.round(totalWait) + 'm</div><div class="route-stat-l">total wait</div></div>' +
    '</div><div class="map-section"><h3>Full day route</h3><div class="map-wrap" id="map-container"></div></div>';

  var totalMins = hours * 60;
  var third = totalMins / 3;
  var segments = [
    {label:'Morning', icon:'🌅', rides:fullRoute.filter(function(s) { return s.startMin < third; })},
    {label:'Afternoon', icon:'☀️', rides:fullRoute.filter(function(s) { return s.startMin >= third && s.startMin < third * 2; })},
    {label:'Evening', icon:'🌙', rides:fullRoute.filter(function(s) { return s.startMin >= third * 2; })}
  ];

  segments.forEach(function(seg) {
    if (!seg.rides.length) return;
    html += '<div class="day-segment"><div class="seg-label">' + seg.icon + ' ' + seg.label + '</div><div class="seg-card">';
    seg.rides.forEach(function(s) {
      var isMust = priority[s.ride.id] === 'must';
      var walkNote = s.walkFromPrev > 0 ? ' · ' + s.walkFromPrev + ' min walk' : '';
      html += '<div class="seg-row">' +
        '<div class="seg-time">' + minToTime(s.startMin) + '</div>' +
        '<div class="seg-icon">' + (isMust ? '★' : '·') + '</div>' +
        '<div class="seg-detail"><div class="seg-name">' + s.ride.name + '</div>' +
        '<div class="seg-sub">' + s.ride.waitTime + ' min wait' + walkNote + '</div></div>' +
        '<div>' + (isMust ? '<span class="must-tag">MUST</span>' : '') + '</div></div>';
    });
    html += '</div></div>';
  });

  if (remaining.length) {
    html += '<div class="day-segment"><div class="seg-label">⏭ Didn&#39;t fit today</div><div class="seg-card">';
    remaining.forEach(function(r) {
      html += '<div class="seg-row">' +
        '<div class="seg-time" style="color:#c7c7cc;">—</div>' +
        '<div class="seg-icon" style="opacity:0.4">·</div>' +
        '<div class="seg-detail"><div class="seg-name" style="color:#8e8e93;">' + r.name + '</div>' +
        '<div class="seg-sub">' + r.waitTime + ' min wait</div></div>' +
        '<span class="wait-badge ' + wc(r.waitTime) + '">' + r.waitTime + 'm</span></div>';
    });
    html += '</div></div>';
  }

  html += '<div style="margin:8px 16px 32px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
    '<button class="sm-btn outline" id="adjust-btn">‹ Adjust</button>' +
    '<button class="sm-btn filled" id="livewaits-btn">Live waits</button></div>';

  document.getElementById('route-body').innerHTML = html;
  document.getElementById('map-container').appendChild(mapSvg);
  document.getElementById('adjust-btn').onclick = function() { showScreen('priority'); };
  document.getElementById('livewaits-btn').onclick = function() { showScreen('rides'); };
}
</script>
