async function reloadRides() {
  document.getElementById('rides-body').innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Loading wait times...</p></div>';
  document.getElementById('rides-footer').style.display = 'none';

  var tpId = TP_IDS[currentPark];
  var urls = [
    'https://api.themeparks.wiki/v1/entity/' + tpId + '/live',
    'https://corsproxy.io/?' + encodeURIComponent('https://api.themeparks.wiki/v1/entity/' + tpId + '/live'),
    PROXY_URL + '/waittimes?park=' + currentPark + '&source=auto'
  ];

  for (var i = 0; i < urls.length; i++) {
    try {
      var res = await fetch(urls[i]);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();

      // themeparks.wiki direct or corsproxy response
      if (data.liveData) {
        rides = [];
        data.liveData.forEach(function(e) {
          if (e.entityType !== 'ATTRACTION' || e.status !== 'OPERATING') return;
          var wait = 0;
          if (e.queue && e.queue.STANDBY && e.queue.STANDBY.waitTime != null)
            wait = e.queue.STANDBY.waitTime;
          rides.push({ id: e.id, name: e.name, waitTime: wait, area: '' });
        });
      } else if (data.rides) {
        // proxy response
        rides = data.rides;
      } else {
        throw new Error('Unrecognised response format');
      }

      if (!rides.length) throw new Error('No open rides');
      rides.sort(function(a, b) { return a.waitTime - b.waitTime; });
      selected = new Set(filteredRides().map(function(r) { return r.id; }));
      assignPositions();
      renderRides(i === 0 ? 'themeparks.wiki' : i === 1 ? 'themeparks.wiki (proxy)' : 'queue-times.com');
      document.getElementById('rides-footer').style.display = 'block';
      updateSelInfo();
      return;
    } catch(e) {
      console.warn('Source ' + i + ' failed: ' + e.message);
    }
  }

  document.getElementById('rides-body').innerHTML =
    '<div class="error-box"><p>Could not load wait times. Check your connection and try again.</p>' +
    '<button id="retry-btn">Try again</button></div>';
  var btn = document.getElementById('retry-btn');
  if (btn) btn.addEventListener('click', reloadRides);
}


function classifyExperience(ride) {
  var name = ((ride && ride.name) || '').toLowerCase();

  // These are lower-movement, show, trail, exhibit, or walkthrough style experiences.
  var attractionWords = [
    'trail','trek','exhibit','exhibits','show','stage','theater','theatre','philharmagic',
    'hall of presidents','carousel of progress','tiki room','country bear','muppet',
    'tough to be a bug','wilderness explorers','conservation station','animal care',
    'gorilla falls','maharajah','tom sawyer','treehouse','enchanted tales',
    'discovery island trail','oasis','impressions','awesome planet','beauty and the beast',
    'frozen sing-along','lightning mcqueen','indiana jones','festival','finding nemo',
    'lion king','feathered friends','bird show'
  ];

  for (var i = 0; i < attractionWords.length; i++) {
    if (name.indexOf(attractionWords[i]) >= 0) return 'attraction';
  }

  // Everything else in the park API is treated as a ride-style stop by default.
  return 'ride';
}

function experienceMatches(ride) {
  if (experienceFilter === 'both') return true;
  return classifyExperience(ride) === experienceFilter;
}

function filteredRides() {
  return rides.filter(experienceMatches);
}

function selectedFilteredRides() {
  return filteredRides().filter(function(r) { return selected.has(r.id); });
}

function filterLabel() {
  return experienceFilter === 'ride' ? 'rides' : experienceFilter === 'attraction' ? 'attractions' : 'rides + attractions';
}

function setExperienceFilter(value) {
  experienceFilter = value || 'both';

  // Keep selected only to visible items when switching filters so routes match the user choice.
  var visible = new Set(filteredRides().map(function(r) { return r.id; }));
  selected = new Set(rides.filter(function(r) { return visible.has(r.id); }).map(function(r) { return r.id; }));

  renderRides(null);
  updateSelInfo();
}

function getRideCoords(name) {
  var lower = name.toLowerCase();
  var keys = Object.keys(RIDE_COORDS);
  for (var i = 0; i < keys.length; i++) {
    if (lower.includes(keys[i])) return RIDE_COORDS[keys[i]];
  }
  return null;
}

function distMetres(a, b) {
  var R = 6371000;
  var dLat = (b.lat - a.lat) * Math.PI / 180;
  var dLng = (b.lng - a.lng) * Math.PI / 180;
  var s = Math.pow(Math.sin(dLat/2), 2) + Math.cos(a.lat*Math.PI/180) * Math.cos(b.lat*Math.PI/180) * Math.pow(Math.sin(dLng/2), 2);
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function walkMins(a, b) {
  var ca = getRideCoords(a.name);
  var cb = getRideCoords(b.name);
  if (!ca || !cb) return 8;
  return Math.round(distMetres(ca, cb) / 80 * 10) / 10;
}

function rideScore(current, candidate, isMust) {
  var walk = walkMins(current, candidate);
  return (isMust ? 0 : 20) + candidate.waitTime + walk * 1.5;
}

function buildMap(route) {
  var ns = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(ns,'svg');
  svg.setAttribute('width','100%');

  function el(tag,a,p){var n=document.createElementNS(ns,tag);Object.keys(a).forEach(function(k){n.setAttribute(k,a[k]);});(p||svg).appendChild(n);return n;}
  function pg(d,a,p){return el('path',Object.assign({d:d,fill:'none'},a),p);}
  function ci(cx,cy,r,a,p){return el('circle',Object.assign({cx:cx,cy:cy,r:r},a),p);}
  function rr(x,y,w,h,a,p){return el('rect',Object.assign({x:x,y:y,width:w,height:h},a),p);}
  function ep(cx,cy,rx,ry,a,p){return el('ellipse',Object.assign({cx:cx,cy:cy,rx:rx,ry:ry},a),p);}
  function tx(s,x,y,sz,fill,w,p){var n=el('text',{x:x,y:y,'font-family':'system-ui','text-anchor':'middle','font-size':sz,fill:fill,'font-weight':w||400,'paint-order':'stroke','stroke':'rgba(0,0,0,0.6)','stroke-width':w?2.5:1.5,'stroke-linejoin':'round'},p);n.textContent=s;return n;}
  function tspan(s,x,dy,n){var t=document.createElementNS(ns,'tspan');t.setAttribute('x',x);t.setAttribute('dy',dy);t.textContent=s;n.appendChild(t);return t;}

  // tree cluster helper
  function trees(pts,r,fill,darkfill,p){
    pts.forEach(function(pt){
      ci(pt[0]+3,pt[1]+3,r,{fill:darkfill||'#2d7a0a'},p||svg);
      ci(pt[0],pt[1],r,{fill:fill||'#3d9a18'},p||svg);
      ci(pt[0],pt[1],Math.round(r*0.55),{fill:fill==='#3d9a18'?'#4db020':fill},p||svg);
    });
  }

  // building helper — roof + body
  function bldg(x,y,w,h,roofH,wallC,roofC,strokeC,p){
    rr(x,y+roofH,w,h,{fill:wallC,stroke:strokeC||'#2a1a08','stroke-width':1.5},p||svg);
    pg('M'+(x-3)+','+(y+roofH)+' L'+(x+w/2)+','+y+' L'+(x+w+3)+','+(y+roofH),{fill:roofC,stroke:strokeC||'#2a1a08','stroke-width':1.5},p||svg);
  }

  function lmk(id, drawFn) {
    var inRoute = route.indexOf(id) >= 0;
    var isSel = selected.has(id);
    var g = el('g',{cursor:'pointer','data-id':id},svg);
    drawFn(g, isSel, inRoute);
    if (isSel && !inRoute) {
      var pos = null;
      rides.forEach(function(r){if(ridePos[r.id]&&ridePos[r.id].lmk===id)pos=ridePos[r.id];});
      if(!pos){Object.keys(ridePos).forEach(function(k){if(ridePos[k].lmk===id)pos=ridePos[k];});}
      if(pos) ci(pos.x,pos.y,28,{fill:'none',stroke:'#185FA5','stroke-width':3,'stroke-dasharray':'5,4'},g);
    }
    g.addEventListener('click',function(){
      if(selected.has(id))selected.delete(id);else selected.add(id);
      renderRides(null);updateSelInfo();
      var cont=svg.parentNode;

  function _rideById(id){
    for (var i=0;i<rides.length;i++) if (rides[i].id === id) return rides[i];
    return null;
  }

  function _dist(a,b){
    var dx = a.x - b.x, dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function _pointAlongPolyline(pts, distance){
    if (!pts || !pts.length) return null;
    if (pts.length === 1) return {x:pts[0].x, y:pts[0].y};
    var remain = distance;
    for (var i=1;i<pts.length;i++) {
      var a = pts[i-1], b = pts[i];
      var seg = _dist(a,b);
      if (remain <= seg || i === pts.length-1) {
        var t = seg ? Math.max(0, Math.min(1, remain / seg)) : 0;
        return {x: a.x + (b.x-a.x)*t, y: a.y + (b.y-a.y)*t};
      }
      remain -= seg;
    }
    return {x:pts[pts.length-1].x, y:pts[pts.length-1].y};
  }

  function _pathLength(pts){
    var n = 0;
    for (var i=1;i<pts.length;i++) n += _dist(pts[i-1], pts[i]);
    return n;
  }

  function _drawRouteBadgesOnLine(routeInfo){
    if (!routeInfo || !routeInfo.badges) return;

    var lastBadge = null;
    routeInfo.badges.forEach(function(badge, idx){
      if (!badge) return;
      var bx = badge.x, by = badge.y;

      // keep badges cleaner if two stops are visually close
      if (lastBadge && _dist(lastBadge, badge) < (currentPark === 'ak' ? 74 : 56) && badge.leg && badge.leg.length > 1) {
        var legLen = _pathLength(badge.leg);
        var moved = _pointAlongPolyline(badge.leg, Math.min(legLen - 10, Math.max(28, legLen * 0.22)));
        if (moved) { bx = moved.x; by = moved.y; }
      }

      if (badge.anchor) {
        ci(badge.anchor.x,badge.anchor.y,5.5,{fill:'#fff',stroke:meta.color,'stroke-width':2.2},svg);
      }

      ci(bx+2,by+3,currentPark === 'ak' ? 17 : 15,{fill:'rgba(0,0,0,0.25)'},svg);

      if (name.indexOf('harambe village') >= 0) return 'harambe_village';
      if (name.indexOf('harambe market') >= 0) return 'harambe_market';

      if (name.indexOf('expedition everest') >= 0 || name.indexOf('everest') >= 0) return 'everest_path';
      if (name.indexOf('kali river') >= 0) return 'kali_path';
      if (name.indexOf('maharajah') >= 0) return 'maharajah_path';
      if (name.indexOf('asia dining') >= 0) return 'asia_dining_path';

      if (name.indexOf('flight of passage') >= 0) return 'flight_path';
      if (name.indexOf("na'vi river journey") >= 0 || name.indexOf('navi river journey') >= 0) return 'navi_path';

      if (name.indexOf('dinosaur') >= 0) return 'dinosaur_path';
      if (name.indexOf('fossil fun games') >= 0) return 'fossil_path';
      if (name.indexOf('dino-rama') >= 0) return 'dinorama_path';
      if (name.indexOf('tricera') >= 0) return 'triceratop_path';

      if (name.indexOf('oasis') >= 0) return 'oasis_w';
      if (name.indexOf('guest services') >= 0) return 'guest_path';
      if (name.indexOf('first aid') >= 0 || name.indexOf('baby care') >= 0) return 'firstaid_path';
      if (name.indexOf('entrance') >= 0) return 'entrance_gate';

      return _nearestNode(pos);
    }

    function shortest(a, b){
      if (a === b) return [a];
      var dist = {}, prev = {}, open = {}, nodes = Object.keys(N);
      nodes.forEach(function(k){ dist[k] = Infinity; open[k] = true; });
      dist[a] = 0;

      while (true) {
        var cur = null, best = Infinity;
        nodes.forEach(function(k){
          if (open[k] && dist[k] < best) { best = dist[k]; cur = k; }
        });
        if (!cur) break;
        if (cur === b) break;
        open[cur] = false;
        G[cur].forEach(function(edge){
          if (!open[edge.to]) return;
          var nd = dist[cur] + edge.w;
          if (nd < dist[edge.to]) { dist[edge.to] = nd; prev[edge.to] = cur; }
        });
      }

      var path = [b], step = b, guard = 0;
      while (prev[step] && guard < 200) {
        step = prev[step];
        path.push(step);
        guard++;
      }
      path.reverse();
      if (path[0] !== a) return [a,b];
      return path;
    }

    function _drawAvailableWalkways() {
      var segs = [];
      edges.forEach(function(e){
        var a = N[e[0]], b = N[e[1]];
        if (!a || !b) return;
        segs.push('M'+a.x+' '+a.y+' L'+b.x+' '+b.y);
      });
      if (!segs.length) return;
      var d = segs.join(' ');
      pg(d,{stroke:'rgba(93,78,38,0.28)','stroke-width':8,'stroke-linecap':'round','stroke-linejoin':'round'});
      pg(d,{stroke:'rgba(240,228,184,0.72)','stroke-width':5.2,'stroke-linecap':'round','stroke-linejoin':'round'});
    }

    _drawAvailableWalkways();

    var stopInfo = routeIds.map(function(id){
      return {
        id:id,
        anchor:ridePos[id],
        node:nodeForRide(id)
      };
    }).filter(function(s){ return s.anchor && s.node; });

    var startNode = routeManualStart || 'entrance_gate';
    if (!N[startNode]) startNode = 'entrance_gate';
    var startPoint = N[startNode];
    var liveMapped = null;

    if (routeStartMode === 'live' && routeLivePosition) {
      liveMapped = akMapPointFromLatLng(routeLivePosition.lat, routeLivePosition.lng);
      if (liveMapped) {
        startPoint = liveMapped;
        startNode = _nearestNode(liveMapped);
      }
    }

    _drawStartMarker(startPoint, !!liveMapped);

    if (!stopInfo.length) return;

    var allPts = [];
    var badgeData = [];

    var startNodePoint = N[startNode];
    if (startPoint && startNodePoint) {
      allPts.push({x:startPoint.x, y:startPoint.y});
      if (_dist(startPoint, startNodePoint) > 8) {
        allPts.push({x:startNodePoint.x, y:startNodePoint.y});
      }
    }

    var prevNode = startNode;
    stopInfo.forEach(function(stop){
      var nodePath = shortest(prevNode, stop.node);
      var legPts = nodePath.map(function(nodeId){ return {x:N[nodeId].x, y:N[nodeId].y}; });

      for (var i=0;i<legPts.length;i++) {
        var p = legPts[i];
        var last = allPts[allPts.length-1];
        if (!last || _dist(last, p) > 1) allPts.push({x:p.x, y:p.y});
      }

      badgeData.push({x:N[stop.node].x, y:N[stop.node].y, anchor:stop.anchor, leg:legPts});
      prevNode = stop.node;
    });

    if (allPts.length > 1) {
      var d = 'M'+allPts[0].x+' '+allPts[0].y;
      for (var i=1;i<allPts.length;i++) d += ' L'+allPts[i].x+' '+allPts[i].y;
      pg(d,{stroke:'rgba(0,0,0,0.45)','stroke-width':11,'stroke-linecap':'round','stroke-linejoin':'round'});
      pg(d,{stroke:'#fff','stroke-width':7,'stroke-dasharray':'14,8','stroke-linecap':'round','stroke-linejoin':'round'});
    }

    _drawRouteBadgesOnLine({badges: badgeData});
  }

  if (currentPark === 'ak') _drawAKWalkingRoute(route);
  else _drawBasicRouteLine(route);

  return svg;
}

function escHTML(v) {
  return String(v == null ? '' : v).replace(/[&<>"']/g, function(ch) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}

function buildRouteMiniMap(route) {
  var ns = 'http://www.w3.org/2000/svg';
  var isAK = currentPark === 'ak';
  var W = isAK ? 1536 : 900;
  var H = isAK ? 1024 : 680;

  function make(tag) { return document.createElementNS(ns, tag); }
  function set(el, attrs) {
    Object.keys(attrs || {}).forEach(function(k) { el.setAttribute(k, attrs[k]); });
    return el;
  }
  function add(tag, attrs, parent) {
    var node = set(make(tag), attrs);
    (parent || svg).appendChild(node);
    return node;
  }
  function textNode(label, x, y, size, fill, weight, anchor, parent) {
    var t = add('text', {
      x:x, y:y,
      'text-anchor':anchor || 'middle',
      'font-family':'system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif',
      'font-size':size,
      'font-weight':weight || 600,
      fill:fill || '#1c1c1e',
      'paint-order':'stroke',
      stroke:'rgba(255,255,255,0.85)',
      'stroke-width':3,
      'stroke-linejoin':'round'
    }, parent);
    t.textContent = label;
    return t;
  }
  function shortName(name) {
    name = String(name || '');
    return name.length > 22 ? name.slice(0, 21) + '…' : name;
  }
  function posForId(id) {
    if (ridePos && ridePos[id]) return ridePos[id];
    return null;
  }
  function rideForId(id) {
    for (var i = 0; i < rides.length; i++) {
      if (rides[i].id === id) return rides[i];
    }
    return null;
  }

  var svg = make('svg');
  svg.setAttribute('class', 'route-mini-map');
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'Route map');

  add('rect', {x:0, y:0, width:W, height:H, rx:24, fill:isAK ? '#dcefd1' : '#eef3ff'});

  // Park-shaped background and land zones. This is intentionally lightweight so the route page never blanks.
  var zones = (PARK_META[currentPark] && PARK_META[currentPark].zones) ? PARK_META[currentPark].zones : [];
  zones.forEach(function(z, i) {
    var zx = isAK ? z.x * W / 500 : z.x * W / 500;
    var zy = isAK ? z.y * H / 500 : z.y * H / 500;
    var rx = isAK ? 190 : 120;
    var ry = isAK ? 125 : 82;
    add('ellipse', {
      cx:zx, cy:zy, rx:rx, ry:ry,
      fill:z.c || '#dbeafe',
      stroke:'rgba(0,0,0,0.16)',
      'stroke-width':3,
      opacity:0.88
    });
    textNode(z.n, zx, zy, isAK ? 28 : 18, '#1c1c1e', 800);
  });

  // Add a simple water/central path hint for Animal Kingdom.
  if (isAK) {
    add('path', {
      d:'M120 480 C300 350 440 430 560 500 C680 570 820 565 955 470 C1110 365 1260 420 1420 500',
      fill:'none', stroke:'#209bd1', 'stroke-width':70, 'stroke-linecap':'round', opacity:0.62
    });
    add('path', {
      d:'M120 480 C300 350 440 430 560 500 C680 570 820 565 955 470 C1110 365 1260 420 1420 500',
      fill:'none', stroke:'#ffffff', 'stroke-width':6, 'stroke-dasharray':'18 18', 'stroke-linecap':'round', opacity:0.75
    });
  }

  var pts = (route || []).map(function(id) {
    var p = posForId(id);
    var r = rideForId(id);
    if (!p) return null;
    return {id:id, x:p.x, y:p.y, ride:r};
  }).filter(Boolean);

  if (pts.length > 1) {
    var d = 'M ' + pts[0].x + ' ' + pts[0].y;
    for (var i = 1; i < pts.length; i++) d += ' L ' + pts[i].x + ' ' + pts[i].y;
    add('path', {d:d, fill:'none', stroke:'rgba(0,0,0,0.32)', 'stroke-width':18, 'stroke-linecap':'round', 'stroke-linejoin':'round'});
    add('path', {d:d, fill:'none', stroke:'#ffffff', 'stroke-width':11, 'stroke-linecap':'round', 'stroke-linejoin':'round'});
    add('path', {d:d, fill:'none', stroke:(PARK_META[currentPark] ? PARK_META[currentPark].color : '#185FA5'), 'stroke-width':6, 'stroke-linecap':'round', 'stroke-linejoin':'round'});
  }

  if (!pts.length) {
    textNode('Route map unavailable for these selections', W/2, H/2, isAK ? 34 : 22, '#6b7280', 700);
    return svg;
  }

  pts.forEach(function(p, idx) {
    add('circle', {cx:p.x, cy:p.y, r:isAK ? 34 : 24, fill:'rgba(0,0,0,0.30)'});
    add('circle', {cx:p.x, cy:p.y, r:isAK ? 29 : 21, fill:(PARK_META[currentPark] ? PARK_META[currentPark].color : '#185FA5'), stroke:'#fff', 'stroke-width':4});
    textNode(String(idx + 1), p.x, p.y + (isAK ? 10 : 7), isAK ? 24 : 17, '#fff', 900);

    var labelY = p.y - (isAK ? 46 : 34);
    var label = shortName(p.ride ? p.ride.name : ('Stop ' + (idx + 1)));
    textNode(label, p.x, labelY, isAK ? 20 : 13, '#1c1c1e', 800);
  });

  return svg;
}


function renderRouteMapSafely(order) {

// ── Quick route (3 rides) ─────────────────────────────────────────────────────

function computeLocalRoute(sel) {
  if (!sel.length) return [];
  var remaining = sel.slice();
  var route = [];

  var current = {name:'entrance', waitTime:0};

  if (currentPark === 'ak') {
    var startNames = {
      entrance_path:'Animal Kingdom Entrance',
      island_center:'Discovery Island',
      tree_path:'Tree of Life',
      africa_entry:'Africa',
      asia_bridge:'Asia',
      pandora_bridge:'Pandora',
      dino_junction:'DinoLand'
    };
    current = {name:startNames[routeManualStart] || 'Animal Kingdom Entrance', waitTime:0};
  }

  while (remaining.length && route.length < 3) {
    var best = null, bestScore = Infinity;
    remaining.forEach(function(r) {
      var walk = walkMins(current, r);

      // Always balance wait time and walking distance.
      // Lower score wins: shorter wait + less walking.
      var s = r.waitTime + walk * 1.5;

      if (s < bestScore) { bestScore = s; best = r; }
    });
    route.push(best);
    remaining.splice(remaining.indexOf(best), 1);
    current = best;
  }
  return route;
}


var routeStartMode = 'preview'; // 'preview' or 'live'
var routeLivePosition = null;   // {lat,lng,accuracy}
var routeLiveMessage = '';
var routeManualStart = 'entrance_path';

function isAnimalKingdomGeo(lat, lng) {
  return lat >= 28.3520 && lat <= 28.3618 && lng >= -81.5965 && lng <= -81.5845;
}

function akMapPointFromLatLng(lat, lng) {
  // Approximate calibration of Disney's Animal Kingdom to the illustrated map.
  var west = -81.5965, east = -81.5845, north = 28.3618, south = 28.3520;
  if (lat < south || lat > north || lng < west || lng > east) return null;

  var xMin = 82, xMax = 1450;
  var yMin = 70, yMax = 980;
  var tx = (lng - west) / (east - west);
  var ty = (north - lat) / (north - south);

  return {
    x: Math.max(xMin, Math.min(xMax, xMin + tx * (xMax - xMin))),
    y: Math.max(yMin, Math.min(yMax, yMin + ty * (yMax - yMin)))
  };
}

function routeStartStatusText() {
  var startLabels = {
    entrance_path:'Entrance',
    island_center:'Discovery Island',
    tree_path:'Tree of Life',
    africa_entry:'Africa',
    asia_bridge:'Asia',
    pandora_bridge:'Pandora',
    dino_junction:'DinoLand U.S.A.'
  };
  var style = 'Balanced wait + walk route';

  if (routeStartMode === 'live') {
    if (routeLivePosition) {
      return style + ' · using your current park location' + (routeLivePosition.accuracy ? ' (±' + Math.round(routeLivePosition.accuracy) + 'm)' : '') + '.';
    }
    if (routeLiveMessage) return style + ' · ' + routeLiveMessage;
    return style + ' · trying to get your location...';
  }
  return style + ' · preview starting from ' + (startLabels[routeManualStart] || 'Entrance') + '.';
}

function ensureRouteStartControls() {
  var mapSection = document.querySelector('.map-section');
  var mapContainer = document.getElementById('map-container');
  if (!mapSection || !mapContainer) return;

  var existing = document.getElementById('route-start-controls');
  if (!existing) {
    var panel = document.createElement('div');
    panel.id = 'route-start-controls';
    panel.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin:8px 0 12px;background:#fff;border-radius:12px;padding:12px;border:1px solid #e5e7eb;';

    panel.innerHTML =
      '<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">' +
        '<button id="route-preview-btn" type="button" style="padding:8px 12px;border-radius:999px;border:1.5px solid #185FA5;background:#fff;color:#185FA5;font-weight:700;cursor:pointer;">Preview route</button>' +
        (currentPark === 'ak'
          ? '<button id="route-live-btn" type="button" style="padding:8px 12px;border-radius:999px;border:1.5px solid #2b7a0b;background:#fff;color:#2b7a0b;font-weight:700;cursor:pointer;">Use my location</button>'
          : '') +
      '</div>' +
      (currentPark === 'ak'
        ? '<div style="display:grid;grid-template-columns:1fr;gap:8px;">' +
            '<label style="font-size:12px;color:#6b7280;font-weight:700;">Start from' +
              '<select id="route-start-select" style="width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid #d1d5db;background:#fff;">' +
                '<option value="entrance_path">Entrance</option>' +
                '<option value="island_center">Discovery Island</option>' +
                '<option value="tree_path">Tree of Life</option>' +
                '<option value="africa_entry">Africa</option>' +
                '<option value="asia_bridge">Asia</option>' +
                '<option value="pandora_bridge">Pandora</option>' +
                '<option value="dino_junction">DinoLand U.S.A.</option>' +
              '</select>' +
            '</label>' +
          '</div>'
        : '') +
      '<div id="route-start-status" style="font-size:13px;color:#6b7280;line-height:1.35;">Preview mode: starting from the park entrance.</div>';

    mapSection.insertBefore(panel, mapContainer);

    document.getElementById('route-preview-btn').onclick = function() {
      routeStartMode = 'preview';
      routeLiveMessage = '';
      updateRouteStartControlsUI();
      renderRouteMapSafely(routeOrder || []);
    };

    var liveBtn = document.getElementById('route-live-btn');
    if (liveBtn) {
      liveBtn.onclick = function() {
        if (!navigator.geolocation) {
          routeStartMode = 'preview';
          routeLiveMessage = 'Location is not supported on this device. Showing preview route.';
          updateRouteStartControlsUI();
          renderRouteMapSafely(routeOrder || []);
          return;
        }

        routeStartMode = 'live';
        routeLiveMessage = 'Trying to get your location...';
        updateRouteStartControlsUI();

        navigator.geolocation.getCurrentPosition(function(pos) {
          var lat = pos.coords.latitude;
          var lng = pos.coords.longitude;
          var acc = pos.coords.accuracy;
          if (!isAnimalKingdomGeo(lat, lng)) {
            routeStartMode = 'preview';
            routeLivePosition = null;
            routeLiveMessage = 'You do not appear to be inside Animal Kingdom. Showing preview route.';
          } else {
            routeLivePosition = {lat:lat, lng:lng, accuracy:acc};
            routeLiveMessage = '';
          }
          updateRouteStartControlsUI();
          renderRouteMapSafely(routeOrder || []);
        }, function(err) {
          routeStartMode = 'preview';
          routeLivePosition = null;
          routeLiveMessage = 'Could not get your location. Showing preview route.';
          updateRouteStartControlsUI();
          renderRouteMapSafely(routeOrder || []);
        }, {enableHighAccuracy:true, timeout:8000, maximumAge:30000});
      };
    }

    var startSelect = document.getElementById('route-start-select');
    if (startSelect) {
      startSelect.value = routeManualStart;
      startSelect.onchange = function() {
        routeManualStart = this.value;
        routeStartMode = 'preview';
        routeLiveMessage = '';
        updateRouteStartControlsUI();
        renderRouteMapSafely(routeOrder || []);
      };
    }
  }

  updateRouteStartControlsUI();
}

async function optimizeRoute() {
  try {
    var sel = selectedFilteredRides();
    if (sel.length < 2) { alert('Select at least 2 ' + filterLabel() + '.'); return; }

    var meta = PARK_META[currentPark];
    var top3 = computeLocalRoute(sel);

    if (!top3.length) {
      showRouteError('I could not build a route from the selected rides. Try selecting a few more rides.', 'rides');
      return;
    }

    routeOrder = top3.map(function(r) { return r.id; });

    var walkLabels = [];
    for (var i = 0; i < top3.length - 1; i++) {
      var w = walkMins(top3[i], top3[i+1]);
      walkLabels.push(w < 1 ? '<1 min walk' : Math.round(w) + ' min walk');
    }

    var tip = safeTipForPark();

    showScreen('route');
    document.getElementById('route-back-btn').onclick = function() { showScreen('rides'); };

    var totalWait = top3.reduce(function(s,r) { return s + r.waitTime; }, 0);
    var totalWalk = top3.reduce(function(s,r,i) { return i === 0 ? s : s + walkMins(top3[i-1], r); }, 0);
    var totalTime = totalWait + Math.round(totalWalk) + top3.length * 5;
    var heroBg = HERO_COLORS[currentPark] || '#185FA5';

    var html = '<div class="route-hero" style="background:' + heroBg + '"><h2>' + meta.emoji + ' Next 3 stops</h2><p>' + escHTML(tip) + '</p></div>' +
      '<div class="route-stats"><div class="route-stat"><div class="route-stat-v">' + top3.length + '</div><div class="route-stat-l">stops</div></div>' +
      '<div class="route-stat"><div class="route-stat-v">' + Math.round(totalWait) + 'm</div><div class="route-stat-l">wait</div></div>' +
      '<div class="route-stat"><div class="route-stat-v">' + Math.round(totalTime) + 'm</div><div class="route-stat-l">total time</div></div></div>' +
      '<div class="map-section"><h3>Route map</h3><div class="map-wrap" id="map-container"></div></div>' +
      '<div class="steps-section"><h3>Your next stops</h3>';

    top3.forEach(function(ride, i) {
      var walkNote = i < walkLabels.length ? '<div class="walk-note">&#8595; ' + walkLabels[i] + '</div>' : '';
      html += '<div class="step-card"><div class="step-num">' + (i+1) + '</div>' +
        '<div style="flex:1"><div class="step-name">' + escHTML(ride.name) + '</div>' +
        '<div class="step-wait">' + escHTML(ride.waitTime) + ' min wait' + (ride.area ? ' · ' + escHTML(ride.area) : '') + '</div></div>' +
        '<span class="wait-badge ' + wc(ride.waitTime) + '">' + escHTML(ride.waitTime) + 'm</span></div>' + walkNote;
    });

    var remaining = sel.filter(function(r) { return routeOrder.indexOf(r.id) < 0; });
    if (remaining.length) {
      html += '<div style="margin-top:16px;padding:14px 16px;background:#fff;border-radius:12px;">' +
        '<div style="font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">After these 3</div>';
      remaining.forEach(function(r) {
        html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f3f4f6;">' +
          '<span style="font-size:14px;color:#6b7280;">' + escHTML(r.name) + '</span>' +
          '<span class="wait-badge ' + wc(r.waitTime) + '">' + escHTML(r.waitTime) + 'm</span></div>';
      });
      html += '</div>';
    }

    html += '</div><div style="margin:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
      '<button class="sm-btn outline" id="back-rides-btn">&#8249; Back</button>' +
      '<button class="sm-btn filled" id="reopt-btn">Re-optimize</button></div>';

    document.getElementById('route-body').innerHTML = html;
    document.getElementById('back-rides-btn').onclick = function() { showScreen('rides'); };
    document.getElementById('reopt-btn').onclick = reoptimize;

    ensureRouteStartControls();
    renderRouteMapSafely(routeOrder);
  } catch (err) {
    console.error('Route optimization failed:', err);
    showRouteError('Route optimization failed. Try selecting fewer rides or refreshing wait times.', 'rides');
  }
}

function reoptimize() {
  if (routeOrder.length > 0) selected.delete(routeOrder[0]);
  optimizeRoute();
}

// ── Priority picker ───────────────────────────────────────────────────────────

function openPriorityPicker() {
  priority = {};
  filteredRides().forEach(function(r) { priority[r.id] = 'skip'; });
  renderPriorityList();
  showScreen('priority');
  var pf = document.getElementById('priority-footer');
  if (pf) pf.style.display = 'block';
}

function renderPriorityList() {
  var mustCount = Object.values(priority).filter(function(v) { return v === 'must'; }).length;
  var wantCount = Object.values(priority).filter(function(v) { return v === 'want'; }).length;
  var info = document.getElementById('priority-info');
  if (info) info.textContent = mustCount + ' must-dos · ' + wantCount + ' want-to-dos · ' + filterLabel();
  var list = document.getElementById('priority-list');
  list.innerHTML = '';

  var visibleRides = filteredRides();
  visibleRides.forEach(function(r) {
    var p = priority[r.id] || 'skip';
    var icons = {must:'★', want:'✓', skip:''};
    var kind = classifyExperience(r) === 'ride' ? 'Ride' : 'Attraction';
    var div = document.createElement('div');
    div.className = 'priority-card' + (p === 'must' ? ' must' : p === 'want' ? ' want' : '');
    div.innerHTML = '<div class="priority-dot">' + (icons[p] || '') + '</div>' +
      '<div style="flex:1"><div class="priority-name">' + escHTML(r.name) + '</div>' +
      '<div class="priority-area">' + kind + ' · ' + escHTML(r.waitTime) + ' min wait</div></div>' +
      '<span class="wait-badge ' + wc(r.waitTime) + '">' + escHTML(r.waitTime) + 'm</span>';
    div.addEventListener('click', function() {
      var cur = priority[r.id] || 'skip';
      priority[r.id] = cur === 'skip' ? 'must' : cur === 'must' ? 'want' : 'skip';
      renderPriorityList();
    });
    list.appendChild(div);
  });
}

// ── Full day route ────────────────────────────────────────────────────────────

async function buildFullDayRoute() {
  try {
    showScreen('route');
    document.getElementById('route-back-btn').onclick = function() { showScreen('priority'); };
    document.getElementById('route-body').innerHTML =
      '<div class="loading" style="padding-top:80px"><div class="loading-spinner"></div><p>Building your full day...</p></div>';

    await new Promise(function(resolve) { requestAnimationFrame(resolve); });

    var meta = PARK_META[currentPark];
    var poolRides = filteredRides();
    var mustRides = poolRides.filter(function(r) { return priority[r.id] === 'must'; });
    var wantRides = poolRides.filter(function(r) { return priority[r.id] === 'want'; });
    var allRides = mustRides.concat(wantRides);

    if (!allRides.length) {
      showRouteError('Pick at least one must-do or want-to ride first.', 'priority');
      return;
    }

    var budgetMins = hours * 60;
    var remaining = allRides.slice();
    var fullRoute = [];
    var elapsed = 0;
    var current = {name:'entrance', waitTime:0};

    while (remaining.length && elapsed < budgetMins - 20) {
      var musts = remaining.filter(function(r) { return priority[r.id] === 'must'; });
      var pool = musts.length ? musts : remaining;
      var best = null, bestScore = Infinity;

      pool.forEach(function(r) {
        var walk = walkMins(current, r);
        var s = (priority[r.id] === 'must' ? 0 : 20) + r.waitTime + walk * 1.5;
        if (s < bestScore) { bestScore = s; best = r; }
      });

      if (!best) break;

      var walk = current.name === 'entrance' ? 5 : walkMins(current, best);
      var rideCost = best.waitTime + walk + 5;
      if (elapsed + rideCost > budgetMins) break;

      fullRoute.push({ride:best, walkFromPrev:Math.round(walk), startMin:Math.round(elapsed + walk)});
      elapsed += rideCost;
      remaining.splice(remaining.indexOf(best), 1);
      current = best;
    }

    routeOrder = fullRoute.map(function(s) { return s.ride.id; });

    if (!fullRoute.length) {
      showRouteError('No route could fit into the selected park hours. Try selecting fewer rides or increasing your park hours.', 'priority');
      return;
    }

    var tip = safeTipForPark();
    var heroBg = HERO_COLORS[currentPark] || '#185FA5';
    var openHour = currentMode === 'fullday' ? (parseInt(document.getElementById('open-hour').value) || 9) : 9;

    function minToTime(min) {
      var total = openHour * 60 + min;
      var h = Math.floor(total / 60);
      var m = total % 60;
      var ampm = h >= 12 ? 'pm' : 'am';
      var disp = h > 12 ? h - 12 : h === 0 ? 12 : h;
      return disp + ':' + (m < 10 ? '0' : '') + m + ampm;
    }

    var totalWait = fullRoute.reduce(function(s,r) { return s + r.ride.waitTime; }, 0);
    var mustDone = mustRides.filter(function(r) {
      return fullRoute.find(function(s) { return s.ride.id === r.id; });
    }).length;

    var html = '<div class="route-hero" style="background:' + heroBg + '"><h2>' + meta.emoji + ' Your full day</h2><p>' + escHTML(tip) + '</p></div>' +
      '<div class="route-stats">' +
      '<div class="route-stat"><div class="route-stat-v">' + fullRoute.length + '</div><div class="route-stat-l">stops</div></div>' +
      '<div class="route-stat"><div class="route-stat-v">' + mustDone + '</div><div class="route-stat-l">must-dos</div></div>' +
      '<div class="route-stat"><div class="route-stat-v">' + Math.round(totalWait) + 'm</div><div class="route-stat-l">total wait</div></div>' +
      '</div><div class="map-section"><h3>Full day route</h3><div class="map-wrap" id="map-container"></div></div>';

    var totalMins = hours * 60;
    var third = totalMins / 3;
    var segments = [
      {label:'Morning', icon:'&#127749;', rides:fullRoute.filter(function(s) { return s.startMin < third; })},
      {label:'Afternoon', icon:'&#9728;&#65039;', rides:fullRoute.filter(function(s) { return s.startMin >= third && s.startMin < third * 2; })},
      {label:'Evening', icon:'&#127769;', rides:fullRoute.filter(function(s) { return s.startMin >= third * 2; })}
    ];

    segments.forEach(function(seg) {
      if (!seg.rides.length) return;
      html += '<div class="day-segment"><div class="seg-label">' + seg.icon + ' ' + escHTML(seg.label) + '</div><div class="seg-card">';
      seg.rides.forEach(function(s) {
        var isMust = priority[s.ride.id] === 'must';
        var walkNote = s.walkFromPrev > 0 ? ' · ' + s.walkFromPrev + ' min walk' : '';
        html += '<div class="seg-row">' +
          '<div class="seg-time">' + escHTML(minToTime(s.startMin)) + '</div>' +
          '<div class="seg-icon">' + (isMust ? '&#9733;' : '·') + '</div>' +
          '<div class="seg-detail"><div class="seg-name">' + escHTML(s.ride.name) + '</div>' +
          '<div class="seg-sub">' + escHTML(s.ride.waitTime) + ' min wait' + escHTML(walkNote) + '</div></div>' +
          '<div>' + (isMust ? '<span class="must-tag">MUST</span>' : '') + '</div></div>';
      });
      html += '</div></div>';
    });

    if (remaining.length) {
      html += '<div class="day-segment"><div class="seg-label">&#9197; Didn&#39;t fit today</div><div class="seg-card">';
      remaining.forEach(function(r) {
        html += '<div class="seg-row">' +
          '<div class="seg-time" style="color:#c7c7cc;">—</div>' +
          '<div class="seg-icon" style="opacity:0.4">·</div>' +
          '<div class="seg-detail"><div class="seg-name" style="color:#8e8e93;">' + escHTML(r.name) + '</div>' +
          '<div class="seg-sub">' + escHTML(r.waitTime) + ' min wait</div></div>' +
          '<span class="wait-badge ' + wc(r.waitTime) + '">' + escHTML(r.waitTime) + 'm</span></div>';
      });
      html += '</div></div>';
    }

    html += '<div style="margin:8px 16px 32px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
      '<button class="sm-btn outline" id="adjust-btn">&#8249; Adjust</button>' +
      '<button class="sm-btn filled" id="livewaits-btn">Live waits</button></div>';

    document.getElementById('route-body').innerHTML = html;
    document.getElementById('adjust-btn').onclick = function() { showScreen('priority'); };
    document.getElementById('livewaits-btn').onclick = function() { showScreen('rides'); };

    ensureRouteStartControls();
    renderRouteMapSafely(routeOrder);
  } catch (err) {
    console.error('Full-day route failed:', err);
    showRouteError('Full-day route failed. Try selecting fewer rides or refreshing wait times.', 'priority');
  }
}
</script>
